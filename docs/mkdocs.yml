      - Update Permissions, Metadata, Legends and Download Links: "admin/management_commands/update_perms_metadata.md"
      - Loading Data into GeoNode: "admin/management_commands/loading_data.md"
      - Create Users and Super Users: "admin/management_commands/create_users.md"
      - Batch Sync Permissions: "admin/management_commands/batch_sync_perms.md"
      - Delete Certain GeoNode Resources: "admin/management_commands/delete_gnode_resources.md"
      - Async execution over http: "admin/management_commands/async_execution_http.md"
    - GeoNode Async Signals: "admin/async.md"
    - Harvesting resources from remote services:
      - Overview: "admin/harvesting/harvesting_overview.md"
      - GeoNode harvesting concepts: "admin/harvesting/gnode_harvesting_concepts.md"
      - Harvesting workflows: "admin/harvesting/harvesting_workflows.md"
      - Harvesting operations: "admin/harvesting/harvesting_operations.md"
      - Standard harvester workers: "admin/harvesting/harvester_workers.md"
    - Read-only and Maintenance modes: "admin/modes/modes.md"
    - Customize the look and feel:
      - GeoNode Themes: "admin/gnode_theme/geonode_themes.md"
      - Theming your GeoNode Project: "admin/gnode_theme/theme_geonode_project.md"
    - Changing the Default Language: "admin/default_lang.md"
    - Thesauri: "admin/thesauri/thesauri.md"
  - Developer Guide: 
    - API Usage: "development/api/api.md"
    - Metadata:
      - Intro to GeoNode metadata management: "development/metadata/intro.md"
      - Metadata app design and implementation: "development/metadata/design.md"
      - Metadata localization: "development/metadata/i18n.md"
      - Schema caching: "development/metadata/caching.md"
      - Metadata editor client: "development/metadata/client.md"
      - Examples:Adding a metadata field: "development/metadata/example.md"
      - Example:Adding an handler: "development/metadata/example2.md"
    - How to develop:
      - Start to develop with Docker: "development/how_to_develop/docker.md"
      - Start MapStore2 client in development mode: "development/how_to_develop/mapstore.md"
extra_css:
  - theme/css/extra.css

extra_javascript:
  - theme/js/dl-anchors.js

theme:
  name: material
  logo: theme/img/geonode-logo-white.svg
  favicon: theme/img/favicon.ico
  custom_dir: 'src/theme'
  language: 'en'
  features:
    - header.autohide
    - navigation.instant
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.blocks.caption
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - def_list
  - toc:
      permalink: true
    
plugins:
  - with-pdf: # https://pypi.org/project/mkdocs-with-pdf/
      author: GeoSolutions Group
      copyright: 'OsGeo ©'
      #
      #cover: false
      #back_cover: true
      cover_logo: 'theme/geonode.png'
      cover_title: GeoNode Documentation
      cover_subtitle: User Guide and Developer Guide
      toc_level: 3
      output_path: pdf/geonode_documentation.pdf
      enabled_if_env: ENABLE_PDF_EXPORT
      debug_html: false # set to true to log the html content of the pdf on the console on build
      show_anchors: true
      verbose: false    # set to true to log the pdf generation steps in detail
      custom_template_path: 'src/print_template' # includes custom styles.scss for pdf
  - search
  - autorefs
